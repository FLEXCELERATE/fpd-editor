<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#243E36"/>
      <stop offset="100%" style="stop-color:#1a2e28"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CA982"/>
      <stop offset="100%" style="stop-color:#5B8C5A"/>
    </linearGradient>
    <linearGradient id="state" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e8e0"/>
      <stop offset="100%" style="stop-color:#b8c8b8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="124" height="124" rx="20" ry="20" fill="url(#bg)"/>

  <!-- Code hint top-left -->
  <g transform="translate(14, 18)" opacity="0.65">
    <text font-family="'Courier New', monospace" font-size="11" fill="#7CA982">{ }</text>
  </g>

  <!-- FPD label top-right -->
  <text x="114" y="26" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="bold" fill="#A3D9A5" text-anchor="end" letter-spacing="1">FPD</text>

  <!-- Input state (top rectangle) -->
  <rect x="48" y="18" width="32" height="18" rx="3" ry="3" fill="url(#state)" opacity="0.9"/>

  <!-- Arrow down from input to process operator -->
  <line x1="64" y1="36" x2="64" y2="44" stroke="#7CA982" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="60,44 64,50 68,44" fill="#7CA982"/>

  <!-- Process Operator (central ellipse) -->
  <ellipse cx="64" cy="66" rx="16" ry="16" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <ellipse cx="64" cy="66" rx="16" ry="16" fill="#5B8C5A" opacity="0.2"/>

  <!-- "P" inside -->
  <text x="64" y="72" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#A3D9A5" text-anchor="middle">P</text>

  <!-- Technical Resource (right, dashed connection) -->
  <line x1="80" y1="66" x2="94" y2="66" stroke="#7CA982" stroke-width="1.5" stroke-dasharray="3,2"/>
  <rect x="94" y="58" width="26" height="16" rx="2" ry="2" fill="none" stroke="#7CA982" stroke-width="1.5"/>
  <text x="107" y="69" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#7CA982" text-anchor="middle">TR</text>

  <!-- Arrow down from process operator to output -->
  <line x1="64" y1="82" x2="64" y2="90" stroke="#7CA982" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="60,90 64,96 68,90" fill="#7CA982"/>

  <!-- Output state (bottom rectangle) -->
  <rect x="48" y="96" width="32" height="18" rx="3" ry="3" fill="url(#state)" opacity="0.9"/>

</svg>
