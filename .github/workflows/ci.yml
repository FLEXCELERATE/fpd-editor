name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm turbo build

      - name: Type check
        run: pnpm turbo build --dry-run > /dev/null && pnpm -r --filter='./packages/*' exec tsc --noEmit

      - name: Lint
        run: pnpm turbo lint

      - name: Check formatting
        run: pnpm format:check

      - name: Test
        run: pnpm turbo test
